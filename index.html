<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>WFA Agent Portal</title>
    <meta name="description" content="Watts Family Agency Agent Portal" />
    <meta name="robots" content="noindex, nofollow" />

    <!-- Google Fonts (Inter + Playfair Display for public site) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Inter:wght@400;500&family=Playfair+Display:wght@500&display=swap" rel="stylesheet" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/icon.png" type="image/png" />

    <!-- PWA / iOS -->
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WFA Portal" />
    <meta name="theme-color" content="#005365" />

    <!-- Apply saved theme synchronously to prevent flash -->
    <script>
      (function () {
        var t = localStorage.getItem('wfa-theme');
        if (!t || t === 'dark') document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
